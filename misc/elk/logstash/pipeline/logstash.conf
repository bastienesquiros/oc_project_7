# Pipeline Logstash
#
# Entrées :
#   - Port 5044 : agents Beats (Filebeat, Metricbeat…)
#   - Port 5000 (TCP JSON) : Spring Boot via logstash-logback-encoder
#
# Sortie : index Elasticsearch horodaté par jour

input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
    tags  => ["spring-boot"]
  }
}

filter {
  # Parsing du niveau de log Spring Boot si présent
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # Supprimer les champs inutiles transmis par Filebeat
  mutate {
    remove_field => ["agent", "ecs", "input", "log", "host"]
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "microcrm-%{+YYYY.MM.dd}"
    action   => "create"
  }
}
