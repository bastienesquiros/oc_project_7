name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  back-ci:
    name: Back-end – Build, Test & Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('back/**/*.gradle*', 'back/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build & Test
        run: ./gradlew build

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          ./gradlew sonar
          -Dsonar.projectKey=bastienesquiros_oc_project_7_back
          -Dsonar.organization=bastienesquiros
          -Dsonar.host.url=https://sonarcloud.io

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: back-jar
          path: back/build/libs/*.jar
          retention-days: 7

  front-ci:
    name: Front-end – Build, Test & Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: front

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-dist
          path: front/dist/microcrm/browser/
          retention-days: 7
