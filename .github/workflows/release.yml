name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/oc_project_7

jobs:
  build-back:
    name: Build Back-end JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('back/**/*.gradle*', 'back/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build JAR
        run: ./gradlew build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: back-jar
          path: back/build/libs/*.jar

  build-front:
    name: Build Front-end Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Zip Angular dist
        run: zip -r front-dist.zip dist/microcrm/browser/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: front-dist
          path: front/front-dist.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-back, build-front]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: back-jar
          path: artifacts/

      - name: Download front dist
        uses: actions/download-artifact@v4
        with:
          name: front-dist
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.jar
            artifacts/front-dist.zip

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-back, build-front]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push back image
        uses: docker/build-push-action@v6
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/back:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push front image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/front:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/front:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
